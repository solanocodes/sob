name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build portable EXE
        run: npm run build

      - name: Get version from package.json
        id: version
        run: |
          $ver = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Shape of Blacks v${{ steps.version.outputs.VERSION }}
          body: |
            ## Shape of Blacks v${{ steps.version.outputs.VERSION }}
            
            Download **ShapeOfBlacks-portable.exe** below — no installation needed, just double-click to play.
            
            Built from commit ${{ github.sha }}
          draft: false
          prerelease: false
          make_latest: true
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
